<!DOCTYPE html>
<html>
<head>
<title>Intro Quiz</title>
<link rel="stylesheet" href="style.css">
</head>
<script src="script.js" defer></script>
<body>

<div class="bereich" style="display: flex;">
    <div>
        <h1>Intro Quiz</h1>
        <p>If you recognize the song, press the red button as quickly as possible. </p>
        <p>Then, 4 options will be displayed for 5 seconds. </p>
        <p>Click on the correct answer before time runs out. Have fun!</p>
    </div>
    <img src="https://media.tenor.com/sHQOEDdNomMAAAAd/monkey-music.gif" style="width: 300px;">
</div>

<div class="bereich">
<div style="display: flex;" class="player-input">
    <label>Enter your name: </label>
    <input type="text" id="playerName" placeholder="e.g. Player111">
    <button class="add-player">Add</button>
</div>

<h2>Player-list</h2>

<ul class="player-list">

</ul>
</div>

<div class="bereich">
<audio class="audio-player" controls>
    Your browser does not support the audio tag.
</audio>


<button class="buzz-button">!</button>


<section id="answer-section" class="answer-section" hidden>
        <div class="answer-row">
            <button class="answer-button"></button>
            <button class="answer-button"></button>
        </div>

        <h3 class="countdown">5</h3>

        <div class="answer-row">
            <button class="answer-button"></button>
            <button class="answer-button"></button>
        </div>
</section>


<section class="player-select-section" hidden>
        <h3>who clicked?</h3>
        <div class="player-buttons">
        </div>
</section>

<div class="navigation" style="display: flex;">
    <button class="nav-button">Back</button>
    <p>
        <strong>Song:</strong>
        <span>1/10</span>
    </p>
    <button class="nav-button">Next</button>
</div>

</div>

<section class="ranking-section" hidden>
    <h2>Ranking</h2>
    <ol class="ranking-list">
    </ol>
</section>

</body>
</html>
